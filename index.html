<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Image Resizer</title>
    <meta name="description" content="Redimensiona, optimiza y convierte tus imágenes con calidad profesional.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Redimensionar <span class="accent">Imagenes</span></h1>
            <p>Sube, ajusta, convierte y descarga con la mejor calidad en segundos.</p>
        </header>

        <main>
            <div class="card glass">
                <div class="upload-area" id="upload-area">
                    <input type="file" id="file-input" accept="image/jpeg, image/png, image/webp, image/gif" hidden>
                    <div class="upload-content" id="upload-content">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="upload-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        <p>Arrastra tu imagen aquí o <span>haz clic para seleccionar</span></p>
                        <p class="formats">Soporta JPG, PNG, GIF, WebP</p>
                    </div>
                    <div class="preview-container hidden" id="preview-container">
                        <img id="image-preview" src="" alt="Vista previa de tu imagen">
                        <button class="btn-icon remove-btn" id="remove-btn" title="Eliminar imagen">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>

                <div class="controls-area disabled" id="controls-area">
                    <div class="preset-group">
                        <label>Preajustes Rápidos</label>
                        <div class="preset-buttons">
                            <button type="button" class="btn-preset" id="preset-wp-icon" title="Site Icon / Favicon">Logo 1:1 (512x512)</button>
                            <button type="button" class="btn-preset" id="preset-wp-logo" title="Logo Horizontal estándar">Logo (250x100)</button>
                            <button type="button" class="btn-preset" id="preset-wp-header" title="Imagen Destacada / Cabecera">Cabecera (1200x628)</button>
                            <button type="button" class="btn-preset" id="preset-wp-hero" title="Banner Full Width">Banner Hero (1920x1080)</button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="width">Ancho (px)</label>
                        <input type="number" id="width" placeholder="Ej: 800" min="1">
                    </div>
                    
                    <div class="input-group">
                        <label for="height">Alto (px)</label>
                        <input type="number" id="height" placeholder="Ej: 600" min="1">
                    </div>

                    <div class="input-group checkbox-group">
                        <label class="custom-checkbox">
                            <input type="checkbox" id="maintain-ratio" checked>
                            <span class="checkmark"></span>
                            Mantener proporción
                        </label>
                    </div>

                    <div class="input-group select-group">
                        <label for="output-format">Formato de Descarga</label>
                        <div class="select-wrapper">
                            <select id="output-format" class="custom-select">
                                <option value="original">Mantener Original</option>
                                <option value="jpeg">JPG</option>
                                <option value="png">PNG</option>
                                <option value="webp">WebP</option>
                            </select>
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="select-icon"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                    </div>

                    <div class="input-group slider-group">
                        <div class="slider-header">
                            <label for="quality">Calidad</label>
                            <span id="quality-value">80%</span>
                        </div>
                        <input type="range" id="quality" min="1" max="100" value="80" class="slider">
                    </div>

                    <button class="btn-primary" id="process-btn">
                        <span>Procesar Imagen</span>
                        <div class="loader hidden" id="btn-loader"></div>
                    </button>
                </div>
            </div>
            
            <div class="result-area hidden glass" id="result-area">
                <h2>¡Imagen lista!</h2>
                <div class="result-actions">
                    <a href="#" id="download-link" class="btn-secondary" download>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Descargar Imagen
                    </a>
                </div>
            </div>
        </main>
    </div>
    
    <div class="toast" id="toast">Mensaje de notificación</div>

    <script src="script.js"></script>
</body>
</html>
